<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient: indigo to purple -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="88" ry="88" fill="url(#brandGradient)"/>
  
  <!-- Stylized "M" - clean and modern -->
  <path d="M 90 370 
           L 90 170 
           L 130 170
           L 180 250 
           L 230 170 
           L 270 170
           L 270 370 
           L 230 370 
           L 230 260 
           L 180 340 
           L 130 260 
           L 130 370 Z" 
        fill="white"/>
  
  <!-- "IQ" stylized as connected element -->
  <g transform="translate(290, 170)">
    <!-- I -->
    <rect x="0" y="0" width="38" height="200" rx="8" ry="8" fill="white"/>
    
    <!-- Q as circle with tail -->
    <circle cx="105" cy="100" r="60" fill="none" stroke="white" stroke-width="34"/>
    <path d="M 130 130 L 170 180" stroke="white" stroke-width="30" stroke-linecap="round"/>
  </g>
  
  <!-- Spark element - representing insight -->
  <g transform="translate(395, 100)" filter="url(#glow)">
    <polygon points="0,-25 8,-8 25,0 8,8 0,25 -8,8 -25,0 -8,-8" fill="white" opacity="0.9"/>
  </g>
</svg>